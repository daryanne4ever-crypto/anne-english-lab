<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Listening Practice | English Lab</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="container">
    <section class="card">
      <h1>Listening Practice</h1>
      <p class="muted">Ouça a frase, grave sua resposta e veja avaliação automática.</p>
      <p><strong>Frase:</strong> <span id="targetPhrase">I am learning English every day.</span></p>

      <audio id="audioPlayer" controls>
        <source src="" type="audio/mpeg" />
        Seu navegador não suporta áudio embutido.
      </audio>

      <div class="spacer"></div>
      <div class="actions">
        <button id="playBtn" class="btn btn-primary">Reproduzir áudio</button>
        <button id="recordBtn" class="btn btn-success">Gravar resposta</button>
        <button id="backBtn" class="btn btn-secondary">Voltar ao Dashboard</button>
      </div>
      <p id="spoken" class="muted">Você falou: -</p>
      <p id="evaluation" class="feedback">Aguardando gravação.</p>
    </section>
  </main>
  <script src="common.js"></script>
  <script src="listening.js"></script>
</body>
</html>
