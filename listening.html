<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Listening Practice | English Lab</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="container">
    <section class="card">
      <h1>Listening Practice</h1>
      <p class="muted">Escute e grave com correção automática usando todas as frases solicitadas.</p>

      <div class="field">
        <label for="category">Categoria</label>
        <select id="category">
          <option value="short">30 Frases Curtas</option>
          <option value="medium">30 Frases Médias</option>
          <option value="connectors">40 Frases com Conectores</option>
          <option value="all" selected>Todas (100 frases)</option>
        </select>
      </div>

      <p><strong>Frase alvo:</strong> <span id="targetPhrase">-</span></p>
      <p class="muted" id="phraseCounter">Frase 1</p>

      <div class="actions">
        <button id="playBtn" class="btn btn-primary">🔊 Reproduzir frase</button>
        <button id="recordBtn" class="btn btn-success">🎤 Gravar resposta</button>
        <button id="nextBtn" class="btn btn-secondary">Próxima frase</button>
        <button id="randomBtn" class="btn btn-secondary">Aleatória</button>
      </div>

      <p id="spoken" class="muted">Você falou: -</p>
      <p id="evaluation" class="feedback">Aguardando gravação.</p>

      <h3>As 50 palavras mais usadas</h3>
      <div id="wordButtons" class="actions"></div>

      <h3>Banco de frases (escutar/gravar)</h3>
      <ul id="phraseList" class="clean"></ul>

      <div class="actions">
        <button id="backBtn" class="btn btn-secondary">Voltar ao Dashboard</button>
      </div>
    </section>
  </main>
  <script src="common.js"></script>
  <script src="listening.js"></script>
</body>
</html>
