<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard | English Lab</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="container">
    <section class="card">
      <h1>Dashboard do Aluno</h1>
      <p class="muted">Acompanhe seu progresso geral.</p>
      <div class="grid stats">
        <div class="stat"><div class="label">Nome</div><div id="name" class="value">-</div></div>
        <div class="stat"><div class="label">Nível</div><div id="level" class="value">1</div></div>
        <div class="stat"><div class="label">XP acumulado</div><div id="xp" class="value">0</div></div>
        <div class="stat"><div class="label">Dias de sequência</div><div id="streak" class="value">1</div></div>
        <div class="stat"><div class="label">Atividades concluídas</div><div id="activities" class="value">0</div></div>
      </div>
      <div class="spacer"></div>
      <div class="actions">
        <a class="btn btn-primary" href="listening.html">Ir para Listening Practice</a>
        <a class="btn btn-primary" href="quizzes.html">Ir para Quizzes</a>
        <a class="btn btn-primary" href="flashcards.html">Ir para Flashcards</a>
        <a class="btn btn-primary" href="translation.html">Ir para Translation Quiz</a>
        <a class="btn btn-secondary" href="performance.html">Ver desempenho detalhado</a>
        <button id="logoutBtn" class="btn btn-danger">Voltar ao login</button>
      </div>
    </section>
  </main>
  <script src="common.js"></script>
  <script src="dashboard.js"></script>
</body>
</html>
