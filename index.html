<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | English Lab</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="container" style="max-width:560px; padding-top:10vh;">
    <section class="card">
      <h1>English Lab - Login</h1>
      <p class="muted">Entre para acessar o dashboard do aluno.</p>
      <div class="field">
        <label for="name">Nome</label>
        <input id="name" type="text" placeholder="Digite seu nome" />
      </div>
      <div class="field">
        <label for="password">Senha</label>
        <input id="password" type="password" placeholder="Digite sua senha" />
      </div>
      <button id="loginBtn" class="btn btn-primary" style="width:100%;">Entrar</button>
      <p id="loginFeedback" class="feedback"></p>
    </section>
  </main>

  <script src="common.js"></script>
  <script src="index.js"></script>
</body>
</html>
