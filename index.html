<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | English Lab</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="container" style="max-width:760px; padding-top:8vh;">
    <section class="card">
      <h1>English Lab - Login</h1>
      <p class="muted">Aluno entra com nome/senha. Professora entra com login exclusivo.</p>

      <div class="grid" style="grid-template-columns: 1fr 1fr; gap:16px;">
        <div>
          <h3>Login Aluno</h3>
          <div class="field">
            <label for="name">Nome</label>
            <input id="name" type="text" placeholder="Digite seu nome" />
          </div>
          <div class="field">
            <label for="password">Senha</label>
            <input id="password" type="password" placeholder="Digite sua senha" />
          </div>
          <button id="loginBtn" class="btn btn-primary" style="width:100%;">Entrar</button>
        </div>

        <div>
          <h3>Login Professora</h3>
          <div class="field">
            <label for="teacherUser">Usuário</label>
            <input id="teacherUser" type="text" placeholder="Usuário da professora" />
          </div>
          <div class="field">
            <label for="teacherPass">Senha</label>
            <input id="teacherPass" type="password" placeholder="Senha da professora" />
          </div>
          <button id="teacherLoginBtn" class="btn btn-success" style="width:100%;">Entrar como Professora</button>
        </div>
      </div>

      <p id="loginFeedback" class="feedback"></p>
    </section>
  </main>

  <script src="common.js"></script>
  <script src="index.js"></script>
</body>
</html>
