<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flashcards | English Lab</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="container">
    <section class="card">
      <h1>Flashcards (50 palavras)</h1>
      <p class="muted">Clique no card para mostrar tradução + IPA. Clique em 🔊 para ouvir pronúncia.</p>
      <div id="flashGrid" class="flash-grid"></div>
      <div class="actions" style="margin-top:16px;">
        <button id="backBtn" class="btn btn-secondary">Voltar ao Dashboard</button>
      </div>
    </section>
  </main>
  <script src="common.js"></script>
  <script src="flashcards.js"></script>
</body>
</html>
