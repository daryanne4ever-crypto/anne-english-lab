<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flashcards | English Lab</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="container">
    <section class="card center">
      <h1>Flashcards</h1>
      <p class="muted">Clique para revelar tradução e ganhar XP.</p>
      <h2 id="word">Happy</h2>
      <p id="meaning" class="muted">(oculto)</p>
      <div class="actions" style="justify-content:center;">
        <button id="revealBtn" class="btn btn-primary">Revelar</button>
        <button id="nextBtn" class="btn btn-secondary">Próximo</button>
        <button id="backBtn" class="btn btn-secondary">Voltar ao Dashboard</button>
      </div>
    </section>
  </main>
  <script src="common.js"></script>
  <script src="flashcards.js"></script>
</body>
</html>
