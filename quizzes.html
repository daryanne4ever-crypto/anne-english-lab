<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quizzes | English Lab</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="container">
    <section class="card">
      <h1>Quiz de Múltipla Escolha (50 questões)</h1>
      <p id="quizMeta" class="muted">Nível 1 · Questão 1/50</p>
      <p id="questionText">Loading...</p>
      <div id="answers" class="grid"></div>
      <p id="quizFeedback" class="feedback"></p>
      <div class="actions">
        <button id="nextQuizBtn" class="btn btn-primary">Próxima questão</button>
        <button id="backBtn" class="btn btn-secondary">Voltar ao Dashboard</button>
      </div>
    </section>
  </main>
  <script src="common.js"></script>
  <script src="quizzes.js"></script>
</body>
</html>
